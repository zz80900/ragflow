name: release

on:
  schedule:
    - cron: '0 13 * * *'  # This schedule runs every 13:00:00Z(21:00:00+08:00)
  workflow_dispatch:
    inputs:
      private_image_tag:
        description: "Tag for private WeCom AIBot images"
        required: false
        default: "customize"
  # https://github.com/orgs/community/discussions/26286?utm_source=chatgpt.com#discussioncomment-3251208
  # "The create event does not support branch filter and tag filter."
  # The "create tags" trigger is specifically focused on the creation of new tags, while the "push tags" trigger is activated when tags are pushed, including both new tag creations and updates to existing tags.
  push:
    branches:
      - "customize"               # private custom image
    tags:
      - "v*.*.*"                  # normal release

permissions:
  contents: write
  actions: read
  checks: read
  statuses: read
  packages: write

env:
  DOCKER_BUILDKIT: "1"

# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v')
    runs-on: [ "self-hosted", "ragflow-release" ]
    steps:
      - name: Ensure workspace ownership
        run: echo "chown -R ${USER} ${GITHUB_WORKSPACE}" && sudo chown -R ${USER} ${GITHUB_WORKSPACE}

      # https://github.com/actions/checkout/blob/v6/README.md
      - name: Check out code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Use the secret as an environment variable
          fetch-depth: 0
          fetch-tags: true

      - name: Prepare release body
        run: |
          if [[ ${GITHUB_EVENT_NAME} != "schedule" ]]; then
            RELEASE_TAG=${GITHUB_REF#refs/tags/}
            if [[ ${RELEASE_TAG} == v* ]]; then
              PRERELEASE=false
            else
              PRERELEASE=true
            fi
            echo "Workflow triggered by create tag: ${RELEASE_TAG}"
          else
            RELEASE_TAG=nightly
            PRERELEASE=true
            echo "Workflow triggered by schedule"
          fi
          echo "RELEASE_TAG=${RELEASE_TAG}" >> ${GITHUB_ENV}
          echo "PRERELEASE=${PRERELEASE}" >> ${GITHUB_ENV}
          RELEASE_DATETIME=$(date --rfc-3339=seconds)
          echo Release ${RELEASE_TAG} created from ${GITHUB_SHA} at ${RELEASE_DATETIME} > release_body.md

      - name: Move the existing mutable tag
        # https://github.com/softprops/action-gh-release/issues/171
        run: |
          git fetch --tags
          if [[ ${GITHUB_EVENT_NAME} == "schedule" ]]; then
            # Determine if a given tag exists and matches a specific Git commit.
            # actions/checkout@v6 fetch-tags doesn't work when triggered by schedule
            if [ "$(git rev-parse -q --verify "refs/tags/${RELEASE_TAG}")" = "${GITHUB_SHA}" ]; then
              echo "mutable tag ${RELEASE_TAG} exists and matches ${GITHUB_SHA}"
            else
              git tag -f ${RELEASE_TAG} ${GITHUB_SHA}
              git push -f origin ${RELEASE_TAG}:refs/tags/${RELEASE_TAG}
              echo "created/moved mutable tag ${RELEASE_TAG} to ${GITHUB_SHA}"
            fi
          fi

      - name: Create or overwrite a release
        # https://github.com/actions/upload-release-asset has been replaced by https://github.com/softprops/action-gh-release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Use the secret as an environment variable
          prerelease: ${{ env.PRERELEASE }}
          tag_name: ${{ env.RELEASE_TAG }}
          # The body field does not support environment variable substitution directly.
          body_path: release_body.md

      - name: Build and push image
        run: |
          sudo docker login --username infiniflow --password-stdin <<< ${{ secrets.DOCKERHUB_TOKEN }}
          sudo docker build -t infiniflow/ragflow:${RELEASE_TAG} -f Dockerfile .
          sudo docker build \
            --build-arg RAGFLOW_BASE_IMAGE=infiniflow/ragflow:${RELEASE_TAG} \
            -t infiniflow/ragflow-wecom-aibot:${RELEASE_TAG} \
            -f docker/wecom-aibot/Dockerfile .
          sudo docker tag infiniflow/ragflow:${RELEASE_TAG} infiniflow/ragflow:latest
          sudo docker tag infiniflow/ragflow-wecom-aibot:${RELEASE_TAG} infiniflow/ragflow-wecom-aibot:latest
          sudo docker push infiniflow/ragflow:${RELEASE_TAG}
          sudo docker push infiniflow/ragflow:latest
          sudo docker push infiniflow/ragflow-wecom-aibot:${RELEASE_TAG}
          sudo docker push infiniflow/ragflow-wecom-aibot:latest

      - name: Build and push ragflow-sdk
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd sdk/python && uv build && uv publish --token ${{ secrets.PYPI_API_TOKEN }}

      - name: Build and push ragflow-cli
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd admin/client && uv build && uv publish --token ${{ secrets.PYPI_API_TOKEN }}

  private-wecom-aibot-image:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/customize'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Prepare private image metadata
        run: |
          IMAGE_TAG="${{ inputs.private_image_tag }}"
          if [[ -z "${IMAGE_TAG}" ]]; then
            IMAGE_TAG="${GITHUB_REF_NAME}"
          fi
          IMAGE_TAG="${IMAGE_TAG//\//-}"
          IMAGE_TAG="$(echo "${IMAGE_TAG}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_NAMESPACE="$(echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          echo "PRIVATE_IMAGE_TAG=${IMAGE_TAG}" >> ${GITHUB_ENV}
          echo "RAGFLOW_PRIVATE_IMAGE=${IMAGE_NAMESPACE}/ragflow:${IMAGE_TAG}" >> ${GITHUB_ENV}
          echo "RAGFLOW_PRIVATE_SHA_IMAGE=${IMAGE_NAMESPACE}/ragflow:${IMAGE_TAG}-${SHORT_SHA}" >> ${GITHUB_ENV}
          echo "WECOM_AIBOT_PRIVATE_IMAGE=${IMAGE_NAMESPACE}/ragflow-wecom-aibot:${IMAGE_TAG}" >> ${GITHUB_ENV}
          echo "WECOM_AIBOT_PRIVATE_SHA_IMAGE=${IMAGE_NAMESPACE}/ragflow-wecom-aibot:${IMAGE_TAG}-${SHORT_SHA}" >> ${GITHUB_ENV}

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build private RAGFlow image
        run: |
          docker build \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "${RAGFLOW_PRIVATE_IMAGE}" \
            -t "${RAGFLOW_PRIVATE_SHA_IMAGE}" \
            -f Dockerfile .

      - name: Build private WeCom AIBot image
        run: |
          docker build \
            --build-arg RAGFLOW_BASE_IMAGE="${RAGFLOW_PRIVATE_IMAGE}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "${WECOM_AIBOT_PRIVATE_IMAGE}" \
            -t "${WECOM_AIBOT_PRIVATE_SHA_IMAGE}" \
            -f docker/wecom-aibot/Dockerfile .

      - name: Push private images
        run: |
          docker push "${RAGFLOW_PRIVATE_IMAGE}"
          docker push "${RAGFLOW_PRIVATE_SHA_IMAGE}"
          docker push "${WECOM_AIBOT_PRIVATE_IMAGE}"
          docker push "${WECOM_AIBOT_PRIVATE_SHA_IMAGE}"
