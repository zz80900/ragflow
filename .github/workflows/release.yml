name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

env:
  DOCKER_BUILDKIT: "1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Prepare release metadata
        run: |
          RELEASE_TAG="${GITHUB_REF#refs/tags/}"
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_NAMESPACE="$(echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          echo "RELEASE_TAG=${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "RAGFLOW_IMAGE=${IMAGE_NAMESPACE}/ragflow:${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "RAGFLOW_SHA_IMAGE=${IMAGE_NAMESPACE}/ragflow:${RELEASE_TAG}-${SHORT_SHA}" >> "${GITHUB_ENV}"
          echo "WECOM_AIBOT_IMAGE=${IMAGE_NAMESPACE}/ragflow-wecom-aibot:${RELEASE_TAG}" >> "${GITHUB_ENV}"
          echo "WECOM_AIBOT_SHA_IMAGE=${IMAGE_NAMESPACE}/ragflow-wecom-aibot:${RELEASE_TAG}-${SHORT_SHA}" >> "${GITHUB_ENV}"

          RELEASE_DATETIME="$(date --rfc-3339=seconds)"
          echo "Release ${RELEASE_TAG} created from ${GITHUB_SHA} at ${RELEASE_DATETIME}" > release_body.md
          {
            echo ""
            echo "Images:"
            echo "- ${IMAGE_NAMESPACE}/ragflow:${RELEASE_TAG}"
            echo "- ${IMAGE_NAMESPACE}/ragflow-wecom-aibot:${RELEASE_TAG}"
          } >> release_body.md

      - name: Create or overwrite release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release_body.md

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build RAGFlow image
        run: |
          docker build \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "${RAGFLOW_IMAGE}" \
            -t "${RAGFLOW_SHA_IMAGE}" \
            -f Dockerfile .

      - name: Build WeCom AIBot image
        run: |
          docker build \
            --build-arg RAGFLOW_BASE_IMAGE="${RAGFLOW_IMAGE}" \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${GITHUB_SHA}" \
            -t "${WECOM_AIBOT_IMAGE}" \
            -t "${WECOM_AIBOT_SHA_IMAGE}" \
            -f docker/wecom-aibot/Dockerfile .

      - name: Push images
        run: |
          docker push "${RAGFLOW_IMAGE}"
          docker push "${RAGFLOW_SHA_IMAGE}"
          docker push "${WECOM_AIBOT_IMAGE}"
          docker push "${WECOM_AIBOT_SHA_IMAGE}"
